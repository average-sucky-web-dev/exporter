name: NodeJS with Vite

permissions:
  contents: write
  id-token: write

on:
  push:
    branches: ["main"]

jobs:
  build:
    #only run if commit message contains !release or starts with release:
    if: github.event_name == 'push' && (contains(github.event.head_commit.message, '!release') || startsWith(github.event.head_commit.message, 'release:'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://npmjs.org'

      - name: Install and Build
        run: |
          npm ci
          npm run build

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}